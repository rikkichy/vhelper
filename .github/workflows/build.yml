name: Build

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      aur:
        description: "Publish to AUR?"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: bump
        run: |
          OLD_VER=$(grep -oP 'pkgver=\K.*' PKGBUILD)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VER"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VER="${MAJOR}.${MINOR}.${PATCH}"

          sed -i "s/pkgver=$OLD_VER/pkgver=$NEW_VER/" PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD

          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Bumped $OLD_VER → $NEW_VER"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "Bump version to v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push --follow-tags

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.bump.outputs.version }}
        run: |
          BODY="### Changes
          + No changes."

          gh release create "$TAG" --draft --title "$TAG" --notes "$BODY"

  aur:
    name: Publish to AUR
    needs: release
    if: inputs.aur == 'yes'
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git openssh

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: vlauncher
          pkgbuild: PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ needs.release.outputs.version }}"
          update_pkgver: true
